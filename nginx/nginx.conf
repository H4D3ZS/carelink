# NGINX Configuration for CareLink QR

events {
    worker_connections 1024;
}

http {
    # Upstream configuration
    upstream api_server {
        server api-server:3000;
        keepalive 32;
    }

    upstream web_app {
        server web-app:3000;
        keepalive 32;
    }

    # Logging configuration
    log_format live_json '{"time":"$time_iso8601","remoteAddr":"$remote_addr","remoteUser":"$remote_user","method":"$request_method","URI":"$uri","protocol":"$server_protocol","status":$status,"bodyBytesSent":$body_bytes_sent,"requestTime":$request_time,"referrer":"$http_referer","userAgent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log live_json;
    error_log /var/log/nginx/error.log warn;

    # Global settings
    worker_processes auto;
    worker_rlimit_nofile 65535;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_body_temp_path /var/temp/client_body;
    client_max_body_size 10m;

    # HTTP Server
    server {
        listen 80;
        server_name api.carelink.example.com;
        root /var/www/html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status":"healthy","timestamp":"$time_iso8601"}';
        }

        # API Gateway
        location /api {
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "keep-alive";
            proxy_set_header Host $http_host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            auth_request /api/auth;
            error_page 401 = @unauthorized;
            error_page 500 502 503 504 = @service_unavailable;

            rate_limit zone=api_limit:10m rate=100r/s;
        }

        # Authentication endpoint
        location /api/auth {
            internal;
            proxy_pass http://api_server/api/auth/validate;
            proxy_http_version 1.1;
        }

        # Service Unavailable error handling
        location @service_unavailable {
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable","message":"Please try again later"}';
        }

        # Unauthenticated requests
        location @unauthorized {
            default_type application/json;
            return 401 '{"error":"Authentication required","message":"Please log in to continue"}';
        }

        # Static files
        location /static {
            alias /var/www/static;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Asset optimization
        location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }

        # Font optimization
        location ~* \.(woff2|woff|ttf|otf)$ {
            expires 60d;
            add_header Cache-Control "public, immutable";
        }

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_comp_level 5;
        gzip_min_length 256;
        gzip_types text/plain text/css text/xml application/javascript application/json application/xml;

        # Rate limiting
        limit_req zone=api_limit burst=100 nodelay;

        # Security headers
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:;" always;
    }

    # HTTPS Configuration
    server {
        listen 443 ssl http2;
        server_name www.carelink.example.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Load balancing
        upstream mobile_app {
            server web-app:3000 max_fails=3 fail_timeout=30s weight=5;
            server web-app:3001 max_fails=3 fail_timeout=30s weight=5 backup;
        }

        location / {
            proxy_pass http://mobile_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect http:// $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # API Documentation
        location /docs {
            alias /var/www/docs/api;
            index index.html;
        }
    }

    # API Versioning
    map $http_api_version $api_version {
        default "v1";
        "v2" "v2";
    }

    # Custom headers
    map $request_uri $api_route {
        ~^/api/(v[0-9]+) $1;
        default /api/v1;
    }

    include /etc/nginx/conf.d/*.conf;
}