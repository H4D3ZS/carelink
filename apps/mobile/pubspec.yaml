name: carelink_qr
description: CareLink QR - Real-Time Patient Transparency System for Families
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # UI Components
  flutter_svg: ^2.0.0
  cached_network_image: ^3.2.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.2
  cupertino_icons: ^1.0.0

  # QR Code
  qr_flutter: ^4.4.0
  mobile_scanner: ^3.5.0

  # API & Network
  http: ^1.1.0
  dio: ^5.3.0
  connectivity_plus: ^4.0.0

  # Authentication
  flutter_secure_storage: ^8.0.0

  # Local Storage
  shared_preferences: ^2.1.0
  path_provider: ^2.1.0

  # Date & Time
  intl: ^0.18.0

  # Charts
  fl_chart: ^0.65.0

  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.3.0
  json_serializable: ^6.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

additional_description: |
  A comprehensive mobile application for real-time patient transparency featuring
  QR code scanning and patient information management for families and healthcare providers.
