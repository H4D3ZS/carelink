services:
  - type: web
    name: carelink-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && pnpm install && pnpm build
    startCommand: cd backend && pnpm start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://carelink-qr.netlify.app
    healthCheckPath: /health
